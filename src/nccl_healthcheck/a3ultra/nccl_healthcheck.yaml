# yamllint disable
apiVersion: v1
kind: Service
metadata:
  name: nccl-headless-svc-${SHORT_GUID}-${CHECK_TIME_EPOCH_SEC}
spec:
  clusterIP: None  #  clusterIP must be None to create a headless service
  selector:
    job-name: nccl-healthcheck-${SHORT_GUID}-${CHECK_TIME_EPOCH_SEC}  # must match Job name
---
apiVersion: batch/v1
kind: Job
metadata:
  name: nccl-healthcheck-${SHORT_GUID}-${CHECK_TIME_EPOCH_SEC}
spec:
  completions: 2
  parallelism: 2
  completionMode: Indexed
  template:
    spec:
      tolerations:
      - operator: "Exists"
      serviceAccountName: nccl-node-list-${SHORT_GUID}-${CHECK_TIME_EPOCH_SEC}
      subdomain: nccl-headless-svc-${SHORT_GUID}-${CHECK_TIME_EPOCH_SEC}  # has to match Service name
      restartPolicy: Never
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      volumes:
      - name: library-dir-host
        hostPath:
          path: /home/kubernetes/bin/nvidia
      - name: shared-memory
        emptyDir:
          medium: "Memory"
          sizeLimit: 250Gi
      - name: usr-local-gib
        emptyDir: {}
      - name: run-sshd
        emptyDir: {}
      nodeSelector:
        node.kubernetes.io/instance-type: a3-ultragpu-8g
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            # Multiple matchExpressions ORed between each other. Statements whithin matchExpressions ANDed.
            - matchExpressions:
              - key: cloud.google.com/gke-accelerator
                operator: Exists
                # It will trigger if label value is older than 24 hours (default) ago
                # or label does not exists.
              - key: aiinfra/nccl-healthcheck-valid-till-sec
                operator: Lt
                values:
                - "${CHECK_TIME_EPOCH_SEC}"
              - key: aiinfra/node-not-ready
                operator: DoesNotExist
              # If aiinfra/nccl-healthcheck-test label is true then it will trigger
              - key: aiinfra/nccl-healthcheck-test
                operator: In
                values:
                - "true"
            - matchExpressions:
              - key: cloud.google.com/gke-accelerator
                operator: Exists
              - key: aiinfra/nccl-healthcheck-valid-till-sec
                operator: DoesNotExist
              - key: aiinfra/node-not-ready
                operator: DoesNotExist
              # If aiinfra/nccl-healthcheck-test label is true then it will trigger
              - key: aiinfra/nccl-healthcheck-test
                operator: In
                values:
                - "true"
          # prefere rule with higher weight
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 50
            preference:
              matchExpressions:
              - key: aiinfra/nccl-healthcheck-valid-till-sec
                operator: DoesNotExist
          - weight: 1
            preference:
              matchExpressions:
              - key: aiinfra/nccl-healthcheck-valid-till-sec
                operator: Lt
                values:
                - "${CHECK_TIME_EPOCH_SEC}"
      initContainers:
      - name: nccl-rdma-installer
        image: us-docker.pkg.dev/kernel-net-team/anthonyhan-test/nccl-ib:nccl2.23.4
        imagePullPolicy: Always
        volumeMounts:
        - name: usr-local-gib
          mountPath: /target/usr/local/gib
        resources:
          requests:
            cpu: 150m
        command:
          - /bin/sh
          - -c
          - |
            /scripts/container_entry.sh install --install-nccl
            cp -R /var/lib/gib/. /target/usr/local/gib
      containers:
      - name: nccl-healthcheck
        image: us-docker.pkg.dev/gce-ai-infra/health-check/nccl-healthcheck:${IMAGE_TAG}
        imagePullPolicy: Always
        securityContext:
          privileged: true
          capabilities:
            add:
            - SYS_ADMIN
            - SYS_PTRACE
            - IPC_LOCK
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: NODE_IP
          valueFrom:
            fieldRef:
              fieldPath: status.hostIP
        - name: JOB_NAME
          value: nccl-healthcheck-${SHORT_GUID}-${CHECK_TIME_EPOCH_SEC}
        - name: SERVICE_NAME
          value: nccl-headless-svc-${SHORT_GUID}-${CHECK_TIME_EPOCH_SEC}
        - name: LD_LIBRARY_PATH
          value: /usr/local/gib/lib64:/usr/local/nvidia/lib64
        - name: NCCL_LIB_DIR
          value: /usr/local/nvidia/lib64
        - name: NHOSTS
          value: "2"
        - name: nr
          value: "8"
        - name: BANDWIDTH_THRESHOLD
          value: "150"
        - name: START_MESSAGE_SIZE
          value: "2G"
        - name: END_MESSAGE_SIZE
          value: "8G"
        - name: HEALTH_VALIDITY_HOURS
          value: "24"
        - name: USE_TCPX
          value: "false"
        - name: USE_FASTRAK
          value: "true"
        - name: DRY_RUN
          value: "${DRY_RUN}"
        - name: SHORT_GUID
          value: "${SHORT_GUID}"
        - name: CHECK_TIME_EPOCH_SEC
          value: "${CHECK_TIME_EPOCH_SEC}"
        - name: SECOND_PASS_YAML_FILE
          value: "nccl_secondpass_a3plus.yaml"
        - name: ENABLE_TWO_PASS_STRATEGY
          value: "true"
        # - name: NCCL_DEBUG
        #   value: "INFO"
        # - name: NCCL_DEBUG_SUBSYS
        #   value: "INIT,ENV"
        - name: INSTANCE_TYPE
          value: "a3-ultragpu-8g"
        - name: IMAGE_TAG
          value: "${IMAGE_TAG}"
        - name: NCCL_FASTRAK_USE_SNAP
          value: "1"
        - name: NCCL_FASTRAK_ENABLE_CONTROL_CHANNEL
          value: "0"
        - name: NCCL_FASTRAK_NUM_FLOWS
          value: "2"
        - name: ITERATIONS
          value: "${ITERATIONS}"
        volumeMounts:
        - name: usr-local-gib
          mountPath: /usr/local/gib
        - name: library-dir-host
          mountPath: /usr/local/nvidia
        - name: shared-memory
          mountPath: /dev/shm
        resources:
          limits:
            nvidia.com/gpu: !!int 8
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nccl-node-list-${SHORT_GUID}-${CHECK_TIME_EPOCH_SEC}
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: nccl-node-list-${SHORT_GUID}-${CHECK_TIME_EPOCH_SEC}
rules:
- apiGroups: ["", "apps", "rbac.authorization.k8s.io", "batch"]
  resources: ["daemonsets", "serviceaccounts", "clusterrolebindings", "clusterroles", "nodes", "jobs", "services"]
  verbs: ["list", "get", "create", "delete", "watch", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: nccl-node-list-${SHORT_GUID}-${CHECK_TIME_EPOCH_SEC}
  namespace: default
subjects:
- kind: ServiceAccount
  name: nccl-node-list-${SHORT_GUID}-${CHECK_TIME_EPOCH_SEC}
  namespace: default
roleRef:
  kind: ClusterRole
  name: nccl-node-list-${SHORT_GUID}-${CHECK_TIME_EPOCH_SEC}
  apiGroup: rbac.authorization.k8s.io
